<div class="container">
	<div class="panel">
		<h1 class="title">Acesso</h1>
		<p class="subtitle">Entre ou crie sua conta para continuar.</p>

		<div class="tabs" role="tablist" aria-label="Modo de autenticação">
			<button
				type="button"
				class="tab"
				[class.active]="mode === 'login'"
				(click)="setMode('login')"
				role="tab"
				[attr.aria-selected]="mode === 'login'"
			>
				Login
			</button>
			<button
				type="button"
				class="tab"
				[class.active]="mode === 'register'"
				(click)="setMode('register')"
				role="tab"
				[attr.aria-selected]="mode === 'register'"
			>
				Cadastro
			</button>
		</div>

		<form (ngSubmit)="submit()" [formGroup]="form" novalidate>
			<div class="field">
				<label for="email">E-mail</label>
				<input id="email" type="email" formControlName="email" autocomplete="email" />
				<div class="msg error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
					E-mail inválido.
				</div>
			</div>

			<div class="field">
				<label for="password">Senha</label>
				<input id="password" type="password" formControlName="password" autocomplete="current-password" />
				<div
					class="msg error"
					*ngIf="form.controls.password.touched && form.controls.password.invalid"
				>
					A senha deve ter pelo menos 6 caracteres.
				</div>
			</div>

			<div class="actions">
				<button class="btn" type="submit" [disabled]="loading">
					{{ loading ? 'Aguarde...' : (mode === 'login' ? 'Entrar' : 'Cadastrar') }}
				</button>
			</div>

			<div class="msg error" *ngIf="errorMessage">{{ errorMessage }}</div>
			<div class="msg ok" *ngIf="okMessage">{{ okMessage }}</div>
		</form>
	</div>
</div>
