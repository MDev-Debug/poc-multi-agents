<div class="dash">
	<aside class="dash-sidebar" [class.closed]="!sidebarOpen">
		<div class="sidebar-header">
			<button class="icon-btn" type="button" (click)="toggleSidebar()" aria-label="Menu">
				<span class="hamburger" [class.open]="sidebarOpen">
					<span></span>
					<span></span>
					<span></span>
				</span>
			</button>
			<div class="brand" *ngIf="sidebarOpen">Chat</div>
		</div>

		<div class="sidebar-body">
			<nav class="sidebar-nav">
				<button class="nav-item active" type="button" aria-current="page">
					<span class="nav-dot"></span>
					<span class="nav-label" *ngIf="sidebarOpen">Home</span>
				</button>

				<div class="nav-submenu" *ngIf="sidebarOpen" aria-label="Usuários online">
					<div class="nav-submenu-title">Usuários online</div>
					<div class="nav-submenu-list" role="list">
						<div class="nav-submenu-item" role="listitem" *ngFor="let user of onlineUsers">
							<span class="user-dot" aria-hidden="true"></span>
							<span class="user-name">{{ user }}</span>
						</div>
					</div>
				</div>
			</nav>
		</div>

		<div class="sidebar-footer">
			<button class="nav-item danger" type="button" (click)="logout()">
				<span class="nav-dot"></span>
				<span class="nav-label" *ngIf="sidebarOpen">Logout</span>
			</button>
		</div>
	</aside>

	<main class="dash-main">
		<header class="dash-topbar">
			<div class="topbar-title">Dashboard</div>
			<div class="topbar-chip">cyberpunk</div>
		</header>

		<section class="dash-content">
			<div class="dash-content-grid">
				<div class="panel">
					<h1 class="title">Home</h1>
					<p class="subtitle">Placeholder — Home será implementado nas próximas sprints.</p>
				</div>
			</div>
		</section>
	</main>
</div>
